xdf:
  file_template: data/sub-{subject}/ses-S001/sarmission/sub-{subject}_ses-S001_task-Default_run-001_sarmission.xdf
  output_template: data/{subject}/{llm_model}/{stream}
  llm_types:
  - gemini
  - chatgpt
  - no_llm
  condition_markers:
    gemini:
      start: llm_start:gemini
      end: llm_end:gemini
    chatgpt:
      start: llm_start:chatgpt
      end: llm_end:chatgpt
    no_llm:
      start: llm_start:no_llm
      end: llm_end:no_llm
glmm:
  files:
    trial_data: ''
    eyetracker_timeline: ''
    llm_periods: ''
    fixations_summary: ''
    fixations_summary_aio: ''
    fixations_long: ''
    fixations_long_aio: ''
    saccades_summary: ''
    saccades_long: ''
  merge_keys:
  - participant_id
  - trial_id
  - llm_provider
  - prompt_type
  - llm_model
synthetic_conditions:
  enabled: true
  providers:
  - gemini
  - chatgpt
  prompts:
  - detailed
  - sparse
  provider_models:
    gemini: gemini-1.5-flash
    chatgpt: gpt-4o
streams:
  game: SARGame
  eyetracker: TobiiEyeTracker
  llm_field: llm_provider
  eyetracker_channels:
    ch0: left_gaze_x
    ch1: left_gaze_y
    ch2: right_gaze_x
    ch3: right_gaze_y
    ch4: left_pupil_diameter
    ch5: right_pupil_diameter
