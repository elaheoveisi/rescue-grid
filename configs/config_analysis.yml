# Participant expertise: expert or novice
# Add each subject ID here; subjects not listed default to 'unknown'
expertise:
  P001: expert
  P002: expert
  P003: novice
  P004: novice
  P005: expert
  P006: novice
  P007: novice
  P008: expert
  P009: novice
  P010: expert


paths:
  raw:          data/raw             # raw XDF files per subject
  intermediate: data/intermediate   # output of xdf.py  (per-trial h5/csv)
  processed:    data/processed       # output of fixations/saccades

glmm2:
  datasets:
    - name: features_q
      source: quarters               # merges features_q25/50/75/100.csv
      dataframes: [features_q25.csv, features_q50.csv, features_q75.csv, features_q100.csv]
    - name: all_features
      source: all_features.csv      # one row per trial, all trials
    - name: best_features
      source: best_features.csv     # one row per trial, best trials only
      dataframes: [best_features.csv]
  continuous: [victims_per_step, mean_fixation_dur_ms, mean_saccade_amp_px,
               game_area_pct_dur, chat_panel_pct_dur, info_panel_pct_dur]
  count:      [n_fixations, n_saccades, n_actions, n_llm_calls, saved_victims]
  quarters:   [25, 50, 75, 100]

eyetracker:
  x_col:       avg_gaze_point_x   # normalized 0-1 (no PsychoPy window set during recording)
  y_col:       avg_gaze_point_y   # normalized 0-1 (no PsychoPy window set during recording)
  time_col:    timestamp
  screen_w:    1920       # screen width in pixels  (used to scale normalized -> pixels)
  screen_h:    1080       # screen height in pixels (used to scale normalized -> pixels)
  missing:     0.0        # value used for missing/invalid samples

  channels:                 # column from tobii
    - avg_gaze_point_x
    - avg_gaze_point_y
    - avg_pupil_diam
    - avg_eye_pos_x
    - avg_eye_pos_y
    - avg_eye_pos_z
    - avg_eye_distance
    - eye_validities

fixation:
  maxdist: 25    # max inter-sample distance in pixels
  mindur:  100   # min fixation duration in ms
  #maxdur:  700   # max fixation duration in ms (removes tracking artifacts)

saccade:
  minlen:  10
  maxvel:  1000
  maxacc:  340   # acceleration threshold in pixels/s²
  maxdur:  150   # max saccade duration in ms (post-detection filter)


aoi:
  - name:  game_area      
    x_min: 150
    y_min: 0
    x_max: 1230
    y_max: 1080

  - name:  info_panel       
    x_min: 1230
    y_min: 0
    x_max: 1770
    y_max: 540

  - name:  chat_panel      
    x_min: 1230
    y_min: 540
    x_max: 1770
    y_max: 1080

 

