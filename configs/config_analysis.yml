# Participant expertise: expert or novice
# Add each subject ID here; subjects not listed default to 'unknown'
expertise:
  P001: expert
  P002: expert
  P003: novice
  P004: novice
  P005: novice
  P006: novice
  P007: novice
  P008: expert
  P009: novice
  P010: expert


paths:
  intermediate: data/intermediate   # output of xdf.py  (per-trial h5/csv)
  processed:    data/processed       # output of fixations/saccades

eyetracker:
  x_col:       avg_gaze_point_x   # normalized 0-1 (no PsychoPy window set during recording)
  y_col:       avg_gaze_point_y   # normalized 0-1 (no PsychoPy window set during recording)
  time_col:    timestamp
  screen_w:    1920       # screen width in pixels  (used to scale normalized -> pixels)
  screen_h:    1080       # screen height in pixels (used to scale normalized -> pixels)
  missing:     0.0        # value used for missing/invalid samples

  channels:                 # column names applied when saving eyetracker.h5/csv
    - device_timestamp
    - avg_gaze_point_x
    - avg_gaze_point_y
    - avg_pupil_diam
    - avg_eye_pos_x
    - avg_eye_pos_y
    - avg_eye_pos_z
    - avg_eye_distance
    - eye_validities

fixation:
  maxdist: 25    # max inter-sample distance in pixels
  mindur:  100   # min fixation duration in ms
  maxdur:  600  # max fixation duration in ms (removes tracking artifacts)
  maxgap:  150  # max allowed time gap between consecutive valid samples (ms); larger gaps break the fixation

saccade:
  minlen:  20     # min saccade duration in ms (detector-level)
  maxvel:  1000  # velocity threshold px/s  (at 58 Hz, fixation jitter ~300 px/s; saccades ~3000+ px/s)
  maxgap:  150   # max allowed time gap between consecutive valid samples (ms)
  mindur:  30  # min saccade duration in ms (post-detection filter)
  maxdur:  150   # max saccade duration in ms (post-detection filter)


aoi:
  - name:  game_area      
    x_min: 150
    y_min: 0
    x_max: 1080
    y_max: 1080

  - name:  info_panel       
    x_min: 1230
    y_min: 0
    x_max: 1770
    y_max: 540

  - name:  chat_panel      
    x_min: 1230
    y_min: 540
    x_max: 1770
    y_max: 1080

 

# Outcomes for GLMM
continuous_outcomes:
  - steps_used_pct
  - total_reward
  - mean_reward
  - trial_duration_s
  - mean_fixation_dur_ms
  - total_fixation_dur_ms
  - mean_saccade_amp_px
  - total_saccade_dur_ms
  - mean_pupil_diam
  - mean_eye_distance
  - pct_missing_eye
  - game_area_pct_dur
  - info_panel_pct_dur
  - chat_panel_pct_dur

  - game_area_mean_dur_ms
  - info_panel_mean_dur_ms
  - chat_panel_mean_dur_ms

  # quarter-level (25 / 50 / 75 / 100 % of steps)
  - q25_game_area_pct_dur
  - q50_game_area_pct_dur
  - q75_game_area_pct_dur
  - q100_game_area_pct_dur
  - q25_chat_panel_pct_dur
  - q50_chat_panel_pct_dur
  - q75_chat_panel_pct_dur
  - q100_chat_panel_pct_dur
  - q25_mean_fixation_dur_ms
  - q50_mean_fixation_dur_ms
  - q75_mean_fixation_dur_ms
  - q100_mean_fixation_dur_ms
  - q25_mean_saccade_amp_px
  - q50_mean_saccade_amp_px
  - q75_mean_saccade_amp_px
  - q100_mean_saccade_amp_px
  - q25_std_pupil_diam
  - q50_std_pupil_diam
  - q75_std_pupil_diam
  - q100_std_pupil_diam
  - q25_victims_per_step
  - q50_victims_per_step
  - q75_victims_per_step
  - q100_victims_per_step

# Step checkpoints: victims saved at each of these % of each trial's total steps
checkpoints:
  - 25
  - 50
  - 75
  - 100

count_outcomes:
  - victims_at_pct_25
  - victims_at_pct_50
  - victims_at_pct_75
  - victims_at_pct_100
  - final_saved_victims
  - final_remaining_victims
  - final_step_count
  - total_steps
  - n_actions
  - n_llm_calls
  - n_fixations
  - n_saccades
  - n_fixations_game_area
  - n_fixations_info_panel
  - n_fixations_chat_panel
