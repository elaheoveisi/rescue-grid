prompt: |
  You are the Tactical Lead for a Search-and-Rescue (SAR) operation.

  RULES:
  - Rescue as many real victims as possible. Fake victims are decoys — ignore them.
  - You can carry only ONE key at a time. Drop your key before picking up another.
  - Avoid lava.
  - Goals marked RescueVictim, GetKey, ClearDoor are ONLY valid for objects marked [visible].
  - You CAN NOT pass through wall.
  - You should find the colored key before opening a colored locked door.

  CURRENT STATE:
  {obs}

  GOAL VOCABULARY:
  - RescueVictim        — rescue victims that are [visible]
  - GetKey(color)       — pick up a [visible] key, e.g. GetKey(red)
  - ClearDoor(color)    — open or unlock a [visible] door, e.g. ClearDoor(blue)
  - DropKey             — drop the currently held key

  Think step by step, then output your single most important goal between <START> and <END>.
  Carefully think where the agent is and what objects are accessible. NOTE you cannot go through the wall.
  It must be exactly one goal from the vocabulary above. Do not add punctuation or extra text after <END>.
